name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nix:
    name: Nix
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check flake
        run: nix flake check --no-write-lock-file

      - name: Check NixOS builds
        run: |
          nix build --no-link \
            .#nixosConfigurations.wsl.config.system.build.toplevel \
            .#nixosConfigurations.mba2013.config.system.build.toplevel

      - name: Check WSL Home Manager activation
        run: |
          nix build --out-link hm-wsl \
            .#nixosConfigurations.wsl.config.home-manager.users.nixos.home.activationPackage

          sudo useradd --create-home --home-dir /home/nixos nixos
          sudo rm -rf /home/nixos/dotfiles
          sudo ln -s "$GITHUB_WORKSPACE" /home/nixos/dotfiles
          sudo chown -h nixos:nixos /home/nixos/dotfiles

          sudo -u nixos env HOME=/home/nixos ./hm-wsl/activate
